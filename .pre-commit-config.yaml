repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.0
    hooks:
      - id: ruff            # lint + auto-fix (imports, unused vars, etc.)
        args: [--fix]
      - id: ruff-format     # format (black-compatible)
  - repo: local
    hooks:
      - id: biome-check
        name: biome (format + lint TypeScript)
        language: system
        entry: bash -c 'cd frontend && npx biome check --write --no-errors-on-unmatched "$@"' --
        types_or: [javascript, jsx, ts, tsx]
        pass_filenames: true
